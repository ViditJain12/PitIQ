services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pitiq-backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      # data/features and models are large — mounted, not baked into image
      - ./data/features:/pitiq/data/features:ro
      - ./models:/pitiq/models:ro
    environment:
      # Allow requests from the nginx frontend container
      - CORS_ORIGINS=http://localhost,http://localhost:80
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pitiq-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: pitiq-network
